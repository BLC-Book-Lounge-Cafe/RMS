name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rms
          POSTGRES_USER: rms
          POSTGRES_PASSWORD: rms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rms -d rms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RMS_DATABASE_URL: postgresql://rms:rms@localhost:5432/rms?schema=public
      RMS_API_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
